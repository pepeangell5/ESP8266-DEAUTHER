[platformio]
src_dir = .

[env:nodemcuv2]
platform = espressif8266@2.6.3
board = nodemcuv2
framework = arduino
platform_packages =
    framework-arduinoespressif8266@file://C:/Users/PepeAngell/AppData/Local/Arduino15/packages/deauther/hardware/esp8266/2.7.5
monitor_speed = 115200
upload_speed = 115200
lib_ldf_mode = deep+
build_src_filter =
